<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LGR Vocabulary Trainer</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4a6cff,#7fa8ff);
margin:0;
text-align:center;
color:white;
}

.header{
padding:40px 20px;
}

.header h1{
margin:0;
font-size:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
max-width:900px;
margin:auto;
}

.tile{
background:white;
color:#333;
border-radius:14px;
padding:30px 20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.25s;
cursor:pointer;
}

.tile:hover{
transform:translateY(-6px) scale(1.03);
}

a{
text-decoration:none;
color:inherit;
}

.progress{
background:#ddd;
border-radius:8px;
height:10px;
margin-top:14px;
overflow:hidden;
}

.bar{
background:#4a6cff;
height:100%;
width:0%;
transition:width .5s;
}

button{
margin-top:30px;
padding:10px 16px;
border:none;
border-radius:8px;
background:white;
color:#4a6cff;
font-weight:bold;
cursor:pointer;
}

.footer{
padding:20px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<div class="header">
<h1>Vocabulary Trainer</h1>
<p>LGR Units 17–20 Study App</p>
</div>

<div class="grid">

<a href="19-20Adv.html">
<div class="tile">
<h2>Lesson 19–20</h2>

<div class="progress">
<div id="bar19" class="bar"></div>
</div>

</div>
</a>

<a href="17-20Adv.html">
<div class="tile">
<h2>Lessons 17–20</h2>

<div class="progress">
<div id="barAll" class="bar"></div>
</div>

</div>
</a>

<a href="flashcards.html">
<div class="tile">
<h2>Flashcards</h2>

<div class="progress">
<div id="barFlash" class="bar"></div>
</div>

</div>
</a>

</div>

<button onclick="resetProgress()">Reset Progress</button>

<div class="footer">
Study • Practice • Master Vocabulary
</div>

<script>

function loadProgress(){

let p19 = localStorage.getItem("score19") || 0;
let pAll = localStorage.getItem("scoreAll") || 0;
let pFlash = localStorage.getItem("scoreFlash") || 0;

document.getElementById("bar19").style.width = p19 + "%";
document.getElementById("barAll").style.width = pAll + "%";
document.getElementById("barFlash").style.width = pFlash + "%";

}

function resetProgress(){

localStorage.clear();
location.reload();

}

loadProgress();

</script>

</body>
</html>
