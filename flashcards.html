<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LGR Flashcards (Units 17–20)</title>

<style>
body{
  font-family:Arial;
  background:#eef2ff;
  text-align:center;
  padding:40px;
}

.card{
  width:380px;
  height:220px;
  margin:auto;
  background:white;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  padding:20px;
}

button{
  padding:10px 16px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#4a6cff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#homeBtn{
  background:#333;
  color:white;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Flashcards</h1>
<h3>Units 17–20</h3>

<div class="card" onclick="flip()" id="card"></div>
<br>
<button onclick="next()">Next Card</button>
<button id="homeBtn" onclick="goHome()">Back to Home</button>

<script>
// Vocabulary
const vocab=[
{w:"elongate",d:"make longer"},{w:"prolong",d:"extend time"},{w:"abbreviate",d:"make shorter"},
{w:"brevity",d:"shortness"},{w:"density",d:"thickness"},{w:"condense",d:"make shorter"},
{w:"emaciated",d:"very thin"},{w:"meager",d:"not plentiful"},{w:"attentive",d:"careful and focused"},
{w:"intend",d:"plan to do"},{w:"aerate",d:"fill with air"},{w:"aerial",d:"in the air"},
{w:"airy",d:"light and open"},{w:"inflate",d:"make bigger"},{w:"deflate",d:"make smaller"},
{w:"ventilate",d:"push air through"},{w:"hyperventilate",d:"breathe too fast"},{w:"aspire",d:"aim for a goal"},
{w:"spirited",d:"energetic"},{w:"expire",d:"come to an end"},{w:"narrative",d:"a story"},
{w:"narrate",d:"tell a story"},{w:"pronounce",d:"say aloud"},{w:"denounce",d:"criticize strongly"},
{w:"fabulous",d:"amazing"},{w:"fabled",d:"legendary"},{w:"mythical",d:"not real"},
{w:"mythology",d:"collection of myths"},{w:"recount",d:"tell or describe"},{w:"discount",d:"reject as untrue"},
{w:"idealistic",d:"believing in perfection"},{w:"ideal",d:"perfectly suitable"},{w:"idealize",d:"think of as perfect"},
{w:"conscience",d:"sense of right and wrong"},{w:"scientific",d:"based on facts"},{w:"savvy",d:"clever understanding"},
{w:"savor",d:"enjoy slowly"},{w:"certify",d:"prove true"},{w:"certainty",d:"something without doubt"},
{w:"concerted",d:"done together"},{w:"ascertain",d:"figure out"}
];

let index=0;
let showWord=true;

// Load last viewed card from localStorage if available
if(localStorage.getItem("flashIndex")){
  index=parseInt(localStorage.getItem("flashIndex"));
}

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
shuffle(vocab);

function render(){
  const card=document.getElementById("card");
  card.innerHTML = showWord ? "<b>"+vocab[index].w+"</b>" : vocab[index].d;
  // Save progress
  localStorage.setItem("flashIndex", index);
}

function flip(){
  showWord=!showWord;
  render();
}

function next(){
  index=(index+1)%vocab.length;
  showWord=true;
  render();
}

function goHome(){
  window.location.href="index.html";
}

// Initial render
render();

</script>

</body>
</html>
