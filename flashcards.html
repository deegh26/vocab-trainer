<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flashcards Units 17–20</title>
<style>
body{font-family:Arial;background:#eef2ff;text-align:center;padding:20px;font-size:18px;}
.card{width:90%;max-width:420px;margin:auto;background:white;padding:20px;border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.2);font-size:22px;cursor:pointer;}
button{padding:10px 16px;margin:10px;border:none;border-radius:8px;background:#4a6cff;color:white;}
</style>
</head>

<body>

<h2>Flashcards (Units 17–20)</h2>
<button onclick="location.href='index.html'">Home</button>

<div class="card" onclick="flip()" id="card"></div>
<br>
<button onclick="next()">Next</button>

<script>

const vocab=[
{w:"elongate",d:"make longer",s:[
"The teacher asked us to elongate the sentence with more details.",
"The shadow began to elongate as the sun went down.",
"She tried to elongate her answer to sound smarter."
]},
{w:"aspire",d:"aim for a goal",s:[
"He hopes to aspire to become a doctor someday.",
"Many students aspire to do well in school.",
"She works hard because she aspires to succeed."
]},
{w:"narrative",d:"a story",s:[
"The book had a clear narrative that was easy to follow.",
"She wrote a narrative about her summer vacation.",
"The teacher asked for a narrative in class."
]},
{w:"scientific",d:"based on facts",s:[
"The project used scientific facts to explain the idea.",
"He made a scientific guess after testing the problem.",
"The report included scientific evidence."
]},
{w:"ascertain",d:"figure out",s:[
"The detective tried to ascertain the truth.",
"We must ascertain what caused the mistake.",
"She asked questions to ascertain the answer."
]}
];

let i=0, showWord=true;

function render(){
let c=document.getElementById("card");
if(showWord){
c.innerHTML="<b>"+vocab[i].w+"</b>";
}else{
c.innerHTML="<b>"+vocab[i].d+"</b><br><br>"+vocab[i].s.join("<br><br>");
}
}

function flip(){showWord=!showWord;render();}
function next(){i=(i+1)%vocab.length;showWord=true;render();}

render();

</script>

</body>
</html>
