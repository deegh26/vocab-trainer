<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Units 17–20</title>
<style>
body{font-family:Arial;background:#eef2ff;text-align:center;padding:20px;}
button{padding:10px;margin:6px;border:none;border-radius:8px;background:#4a6cff;color:white;}
.option{display:block;margin:8px auto;padding:12px;border:1px solid #ccc;width:80%;max-width:300px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<h2>Units 17–20</h2>
<button onclick="location.href='index.html'">Home</button>

<button onclick="start()">Start Multiple Choice</button>
<div id="app"></div>

<script>

const vocab=[
{w:"elongate",d:"make longer"},
{w:"aspire",d:"aim for a goal"},
{w:"expire",d:"come to an end"},
{w:"density",d:"thickness"}
];

let i=0;

function start(){
i=0;
show();
}

function show(){
let correct=vocab[i];

let html="<h3>"+correct.w+"</h3>";

vocab.forEach(v=>{
html+="<div class='option' onclick='check(\""+v.d+"\")'>"+v.d+"</div>";
});

document.getElementById("app").innerHTML=html;
}

function check(ans){
if(ans===vocab[i].d){
alert("✅ Correct!");
i++;
if(i<vocab.length){
show();
}else{
document.getElementById("app").innerHTML="<h3>🎉 Finished!</h3>";
}
}else{
alert("❌ Try again!");
}
}

</script>

</body>
</html>
