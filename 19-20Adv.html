<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LGR Vocabulary Trainer Units 19–20</title>
<style>
body{font-family:Arial; background:#eef2ff; text-align:center; padding:30px;}
.card{width:380px; min-height:220px; margin:auto; background:white; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; padding:20px; flex-direction:column; font-size:22px; cursor:pointer;}
button{padding:10px 16px; margin:6px; border:none; border-radius:8px; background:#4a6cff; color:white; font-size:15px; cursor:pointer;}
.option{display:block; width:260px; margin:6px auto; background:#ffffff; border:1px solid #ccc; padding:10px; border-radius:6px; cursor:pointer;}
.stats{font-size:18px;}
#homeBtn{background:#333; color:white; margin-top:20px;}
.feedback{font-size:18px; margin:10px;}
</style>
</head>
<body>

<h1>LGR Vocabulary Trainer</h1>
<h3>Units 19–20</h3>

<button onclick="flashcards()">Flashcards</button>
<button onclick="sentenceQuiz()">Sentence Quiz</button>
<button onclick="multipleChoice()">Multiple Choice Test</button>
<button onclick="review()">Hard Words Review</button>
<button onclick="cram()">5 Minute Cram</button>

<div id="app"></div>
<button id="homeBtn" onclick="goHome()">Back to Home</button>

<script>
const vocab=[
{w:"narrative",d:"a story"},{w:"narrate",d:"to tell a story"},{w:"pronounce",d:"to say aloud"},
{w:"denounce",d:"to criticize strongly"},{w:"fabulous",d:"amazing"},{w:"fabled",d:"legendary"},
{w:"mythical",d:"not real"},{w:"mythology",d:"collection of myths"},{w:"recount",d:"tell or describe"},
{w:"discount",d:"reject as untrue"},{w:"idealistic",d:"believing in perfection"},{w:"ideal",d:"perfectly suitable"},
{w:"idealize",d:"think of as perfect"},{w:"conscience",d:"sense of right and wrong"},{w:"scientific",d:"based on facts"},
{w:"savvy",d:"clever understanding"},{w:"savor",d:"enjoy slowly"},{w:"certify",d:"prove true"},
{w:"certainty",d:"something without doubt"},{w:"concerted",d:"done together"},{w:"ascertain",d:"figure out"}
];

let index=0, showWord=true, missed=[], score=0, mcAnswered=false;

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function goHome(){ window.location.href="index.html"; }

// FLASHCARDS
function flashcards(){ shuffle(vocab); index=0; showWord=true; document.getElementById("app").innerHTML=`<h2>Flashcards</h2><div class="card" id="card" onclick="flip()"></div><br><button onclick="next()">Next</button>`; render(); }
function render(){ document.getElementById("card").innerHTML = showWord ? "<b>"+vocab[index].w+"</b>" : vocab[index].d; }
function flip(){ showWord=!showWord; render(); }
function next(){ index=(index+1)%vocab.length; showWord=true; render(); }

// SENTENCE QUIZ
const sentenceQuestions=[
{q:"The teacher asked the student to ______ the story.",a:"narrate"},
{q:"The scientist used ______ evidence.",a:"scientific"},
{q:"The detective tried to ______ the truth.",a:"ascertain"},
{q:"The team made a ______ effort.",a:"concerted"},
{q:"The inspector will ______ the results.",a:"certify"},
{q:"Fans sometimes ______ celebrities and think they are perfect.",a:"idealize"},
{q:"Her computer ______ helped her fix the problem.",a:"savvy"},
{q:"The teacher asked us to ______ each word clearly.",a:"pronounce"},
{q:"Greek ______ includes stories about Zeus.",a:"mythology"},
{q:"She wanted to ______ every bite of the delicious cake.",a:"savor"}
];

function sentenceQuiz(){ shuffle(sentenceQuestions); index=0; score=0; showSentence(); }
function showSentence(){ 
  if(index>=sentenceQuestions.length){ 
    localStorage.setItem("score19", Math.round((score/sentenceQuestions.length)*100));
    document.getElementById("app").innerHTML=`<h2>Quiz Complete</h2><p>Score ${score}/${sentenceQuestions.length}</p>`; 
    return; 
  }
  document.getElementById("app").innerHTML=`<p style='font-size:22px'>${sentenceQuestions[index].q}</p>
    <input id='ans'><br><br>
    <button onclick='checkSentence()'>Submit</button>
    <p class='stats'>Score: ${score}</p>`;
}
function checkSentence(){ 
  let u=document.getElementById("ans").value.toLowerCase();
  if(u===sentenceQuestions[index].a){ score++; } else{ missed.push(sentenceQuestions[index].a); alert("Answer: "+sentenceQuestions[index].a); }
  index++; showSentence(); 
}

// MULTIPLE CHOICE WITH FEEDBACK
function multipleChoice(){ shuffle(vocab); index=0; score=0; mcAnswered=false; showMC(); }
function showMC(){ 
  if(index>=10){ 
    localStorage.setItem("score19", Math.round((score/10)*100)); 
    document.getElementById("app").innerHTML=`<h2>Test Complete</h2><p>Score ${score}/10</p>`; 
    return; 
  }

  let correct=vocab[index];
  let options=[correct];
  while(options.length<4){
    let r=vocab[Math.floor(Math.random()*vocab.length)];
    if(!options.includes(r)) options.push(r);
  }
  shuffle(options);

  let html="<h2>"+correct.w+"</h2><div id='feedback' class='feedback'></div>";
  options.forEach(o=>{
    html+=`<div class='option' onclick='checkMC("${o.d}","${correct.d}")'>${o.d}</div>`;
  });
  document.getElementById("app").innerHTML=html;
  mcAnswered=false;
}

function checkMC(choice, correctAnswer){
  if(mcAnswered) return; // ignore multiple clicks
  mcAnswered=true;
  const feedback=document.getElementById("feedback");
  if(choice===correctAnswer){
    score++;
    feedback.innerHTML="<span style='color:green'>Correct!</span>";
  } else{
    missed.push(vocab[index].w);
    feedback.innerHTML=`<span style='color:red'>Wrong! Correct: ${correctAnswer}</span>`;
  }
  setTimeout(()=>{ index++; showMC(); }, 1000);
}

// HARD WORDS REVIEW
function review(){ 
  if(missed.length===0){ document.getElementById("app").innerHTML="<h2>No hard words yet!</h2>"; return; }
  let html="<h2>Hard Words</h2>";
  missed.forEach(w=>{ let v=vocab.find(x=>x.w===w); if(v){ html+="<p><b>"+v.w+"</b> — "+v.d+"</p>"; } });
  document.getElementById("app").innerHTML=html;
}

// 5-MINUTE CRAM
function cram(){ 
  let html="<h2>5 Minute Cram Sheet</h2>";
  vocab.forEach(v=>{ html+="<p><b>"+v.w+"</b> — "+v.d+"</p>"; });
  document.getElementById("app").innerHTML=html; 
}
</script>
</body>
</html>
